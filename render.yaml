services:
  - type: web
    name: futbolstats-pro
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futbolstats-db
          property: connectionString

databases:
  - name: futbolstats-db
    plan: free
    databaseName: futbol_db
